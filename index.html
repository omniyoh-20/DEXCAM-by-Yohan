<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXCAM by Yohan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <div id="controls">
            <div class="app-branding centered-section">
                <h1 id="brand-title">DEXCAM</h1>
                <span id="brand-author">by Yohan</span>
                <span id="version-tag">v2.0.0</span>
                <div id="privacy-badge">
                    <span class="shield-icon">🛡️</span> Local Sandbox Active (Zero Data Collected)
                </div>
            </div>
            
            <hr>
            <h2 class="centered-section">ASCII Controls</h2>
            
            <div class="control-group">
                <label class="custom-checkbox-label">
                    <input type="checkbox" id="mirror-cam" checked>
                    <span class="checkbox-box"></span> Mirror Camera
                </label>
            </div>

            <div class="control-group">
                <label for="display-mode">Display Mode</label>
                <select id="display-mode">
                    <option value="overlay">Webcam Overlay</option>
                    <option value="ascii-only">Pure ASCII Matrix</option>
                </select>
            </div>

            <div class="control-group">
                <label for="glyph-size">Glyph Resolution Layer (<span id="size-val">10</span>px)</label>
                <input type="range" id="glyph-size" min="6" max="25" value="10">
            </div>

            <div class="control-section">
                <h3>ASCII ENGINE RENDERING (v2.0.0)</h3>
                
                <label for="ascii-speed">Engine Refresh Rate (FPS):</label>
                <select id="ascii-speed">
                    <option value="0">Capped (Max Performance)</option>
                    <option value="30">30 FPS (Cinematic Cinema)</option>
                    <option value="15">15 FPS (Retro Terminal)</option>
                    <option value="5">5 FPS (Stop Motion Matrix)</option>
                </select>
                
                <div style="margin-top:15px;">
                    <label class="custom-checkbox-label">
                        <input type="checkbox" id="glow-toggle">
                        <span class="checkbox-box"></span> Glow
                    </label>
                </div>
                
                <div class="control-group-row" style="margin-top:10px;">
                    <div>
                        <label for="glow-color">Glow Color:</label>
                        <input type="color" id="glow-color" value="#00ff00">
                    </div>
                    <div>
                        <label for="glow-strength">Glow Strength (<span id="glow-strength-val">5</span>px):</label>
                        <input type="range" id="glow-strength" min="1" max="20" value="5">
                    </div>
                </div>
            </div>

            <hr>
            <h2>Color Profiler</h2>
            
            <div class="control-group">
                <label class="custom-checkbox-label">
                    <input type="checkbox" id="use-source-color">
                    <span class="checkbox-box"></span> Render Source Webcam Color
                </label>
            </div>

            <div class="control-group">
                <label for="glyph-color">Global Glyph Fill Hex</label>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <input type="color" id="glyph-color" value="#00ff00">
                    <span style="font-size:12px; color:#86868b;">Main Hex Accent</span>
                </div>
            </div>

            <div class="control-group-row" style="margin-top: 15px;">
                <div>
                    <label for="bg-shadow" style="margin-bottom:6px;">Shadows</label>
                    <input type="color" id="bg-shadow" value="#000000">
                </div>
                <div>
                    <label for="bg-midtone" style="margin-bottom:6px;">Midtones</label>
                    <input type="color" id="bg-midtone" value="#000000">
                </div>
                <div>
                    <label for="bg-highlight" style="margin-bottom:6px;">Highlights</label>
                    <input type="color" id="bg-highlight" value="#000000">
                </div>
            </div>

            <hr>
            <h2>Tonal Mapping Pipeline</h2>

            <div class="tonal-block">
                <div class="tonal-header">
                    <label class="custom-checkbox-label">
                        <input type="checkbox" id="map-shadows-enable" checked>
                        <span class="checkbox-box"></span> <strong>Shadow Matrix</strong>
                    </label>
                    <input type="range" id="thresh-shadow" min="0" max="255" value="85">
                    <span class="threshold-badge"><span id="shadow-val">85</span>dn</span>
                </div>
                <div class="control-group">
                    <select id="map-shadows">
                        <option value="math" selected>MATHEMATICS+</option>
                        <option value="greek">GREEK</option>
                        <option value="russian">CRYILLIC</option>
                        <option value="thai">SIAM THAI</option>
                        <option value="baybayin">BAYBAYIN</option>
                        <option value="chinese">HANZI</option>
                        <option value="japanese">JAPANESE+</option>
                        <option value="roman">ROMAN ALEPH</option>
                        <option value="alphabetPlus">DIACRITICS</option>
                        <option value="armenian">ARMENIAN</option>
                        <option value="georgian">GEORGIAN</option>
                        <option value="cambodian">KHMER</option>
                        <option value="hindu">DEVANAGARI</option>
                    </select>
                </div>
            </div>

            <div class="tonal-block">
                <div class="tonal-header">
                    <label class="custom-checkbox-label">
                        <input type="checkbox" id="map-midtones-enable" checked>
                        <span class="checkbox-box"></span> <strong>Midtone Matrix</strong>
                    </label>
                    <input type="range" id="thresh-midtone" min="0" max="255" value="170">
                    <span class="threshold-badge"><span id="mid-val">170</span>dn</span>
                </div>
                <div class="control-group">
                    <select id="map-midtones">
                        <option value="math">MATHEMATICS+</option>
                        <option value="greek" selected>GREEK</option>
                        <option value="russian">CYRILLIC</option>
                        <option value="thai">SIAM THAI</option>
                        <option value="baybayin">BAYBAYIN</option>
                        <option value="chinese">HANZI</option>
                        <option value="japanese">JAPANESE+</option>
                        <option value="roman">ROMAN ALEPH</option>
                        <option value="alphabetPlus">DIACRITICS</option>
                        <option value="armenian">ARMENIAN</option>
                        <option value="georgian">GEORGIAN</option>
                        <option value="cambodian">KHMER</option>
                        <option value="hindu">DEVANAGARI</option>
                    </select>
                </div>
            </div>

            <div class="tonal-block">
                <div class="tonal-header">
                    <label class="custom-checkbox-label">
                        <input type="checkbox" id="map-highlights-enable" checked>
                        <span class="checkbox-box"></span> <strong>Highlight Matrix</strong>
                    </label>
                    <input type="range" id="thresh-highlight" min="0" max="255" value="230">
                    <span class="threshold-badge"><span id="high-val">230</span>dn</span>
                </div>
                <div class="control-group">
                    <select id="map-highlights">
                        <option value="math">MATHEMATICS+</option>
                        <option value="greek">GREEK</option>
                        <option value="russian" selected>CYRILLIC</option>
                        <option value="thai">SIAM THAI</option>
                        <option value="baybayin">SIAM THAI</option>
                        <option value="chinese">HANZI</option>
                        <option value="japanese">JAPANESE+</option>
                        <option value="roman">ROMAN ALEPH</option>
                        <option value="alphabetPlus">DIACRITICS</option>
                        <option value="armenian">ARMENIAN</option>
                        <option value="georgian">GEORGIAN</option>
                        <option value="cambodian">KHMER</option>
                        <option value="hindu">DEVANAGARI</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="viewport-workspace">
            <div id="screen-canvas-container">
                <video id="webcam" autoplay playsinline style="display:none;"></video>
                <div class="canvas-wrapper">
                    <canvas id="ascii-canvas"></canvas>
                    <div id="countdown-overlay"></div>
                </div>
                
                <button id="snap-btn">
                    SAY CHEESE! 
                    <span class="shortcut-hint">(Ctrl + A)</span>
                </button>
            </div>
            
            <button id="gallery-trigger-btn">
                <span class="gallery-icon">📸</span> GALLERY
            </button>

            <div id="mini-gallery-deck" class="closed">
                <div class="gallery-panel-header">
                    <h4>MY SNAPS</h4>
                    <span id="close-gallery-btn">&times;</span>
                </div>
                <div id="gallery-items-container"></div>
            </div>
        </div>
    </div>

    <div id="lightbox-modal" class="hidden">
        <div class="modal-content">
            <span id="close-modal">&times;</span>
            <img id="modal-img" src="" alt="Review Snapshot">
            <div class="modal-actions">
                <button id="modal-save-btn" class="action-btn save">Save to Device</button>
                <button id="modal-delete-btn" class="action-btn delete">Delete Photo</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
